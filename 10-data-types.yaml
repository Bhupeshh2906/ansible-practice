- name: "showcasing data type in playbook"
  hosts: "localhost"
  vars:
    course: "Devsecops with AWS" # string
    duration: 120 #number
    IS_LIVE: yes # boolean
    Tools: #list[]
    - Linux
    - shell
    - Ansible
    Concepts: #map or dictionary or object{}
     CI: Jenkins
     Scripting: "Shell, Ansible, Terraform, Python"
  tasks:
    - name: "print to showcase the data types in a playbook"
      ansible.builtin.debug:
        msg: "Course is: {{ COURSE }}, Duration: {{ DURATION }}, is live?: {{ IS_LIVE }}, Tools are: {{ TOOLS }}, Concepts are: {{ CONCETPS }}"
        